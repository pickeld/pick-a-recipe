# srv2 deployment — superseded by portainer/stack.yml
# Repo path: /opt/pick-a-recipe
# Image: pickeld/pick-a-recipe:latest
# Deploy / update:
#   ./scripts/portainer-migrate.sh
# or (with Portainer API credentials):
#   ./scripts/portainer-deploy.sh --pull
#
# Legacy source-mounted dev stack kept for reference only.
services:
  pick-a-recipe:
    image: pickeld/pick-a-recipe:latest
    container_name: pick-a-recipe
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      - HOST=0.0.0.0
      - PORT=5006
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-change-me-to-a-random-secret-key}
    volumes:
      - pick-a-recipe-data:/app/data
      - pick-a-recipe-data:/tmp

volumes:
  pick-a-recipe-data:
    external: true
    name: social_recipe_social-recipes
