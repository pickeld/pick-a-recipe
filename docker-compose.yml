version: "3.8"

services:
  pick-a-recipe:
    image: pickeld/pick-a-recipe:latest
    # Uncomment to build from source instead:
    # build: .
    container_name: pick-a-recipe
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      - HOST=0.0.0.0
      - PORT=5006
      - FLASK_SECRET_KEY=change-me-to-a-random-secret-key
    volumes:
      - pick-a-recipe:/app/data
      - pick-a-recipe:/tmp

volumes:
  pick-a-recipe:
