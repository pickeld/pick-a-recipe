{% extends "base.html" %}

{% block title %}Set Password - Pick-a-Recipe{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img src="{{ url_for('static', filename='icons/icon-192x192.png') }}" alt="Pick-a-Recipe" class="logo-image">
            <h1>Secure Your Account</h1>
            <p>You must set a new password before using the app.</p>
        </div>

        <form method="POST" action="{{ url_for('setup_password') }}" class="login-form">
            {% if user.auth_provider != 'google' or user.password_hash %}
            <div class="form-group">
                <label for="current_password"><i class="fas fa-lock"></i> Current Password</label>
                <input type="password" id="current_password" name="current_password"
                       placeholder="Enter current password" autocomplete="current-password">
            </div>
            {% endif %}

            <div class="form-group">
                <label for="new_password"><i class="fas fa-key"></i> New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="8"
                       placeholder="At least 8 characters" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-key"></i> Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                       placeholder="Repeat new password" autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-check"></i> Save Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
